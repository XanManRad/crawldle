    <style>
        /* 🌲 MUD, ROCK, & PINE THEME 🌲 */
        body { 
            font-family: 'Impact', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Your Pixel Art Background goes here! */
            background-image: url('background.png');
            background-color: #15120e; /* Fallback color */
            background-size: cover;
            background-position: center bottom;
            background-attachment: fixed;
            color: #e0dcd3; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
        }

        h1 { 
            color: #f39c12; 
            font-size: 3.5em;
            margin-bottom: 0px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px #000, 6px 6px 15px rgba(243, 156, 18, 0.4);
        }

        .subtitle { 
            font-size: 18px; 
            color: #8c9b78; 
            margin-top: 5px; 
            margin-bottom: 30px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px #000;
        }

        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            position: relative; 
            background-color: rgba(20, 18, 16, 0.85); 
            padding: 30px;
            border-radius: 12px;
            border: 4px solid #3c4a28; 
            box-shadow: 0px 15px 35px rgba(0,0,0,0.9);
        }
        
        /* Search Bar Styles */
        .search-container { position: relative; display: inline-block; width: 80%; text-align: left; }
        
        input[type="text"] { 
            padding: 15px; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 6px; 
            border: 3px solid #5a4b38; 
            outline: none; 
            background-color: #1a1714; 
            color: #f39c12; 
            box-sizing: border-box;
            text-transform: uppercase;
            box-shadow: inset 0px 5px 10px rgba(0,0,0,0.8);
        }

        input[type="text"]:focus { 
            border-color: #f39c12; 
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5), inset 0px 5px 10px rgba(0,0,0,0.8);
        }
        
        .autocomplete-items { 
            position: absolute; 
            border: 3px solid #5a4b38; 
            border-top: none; 
            z-index: 99; 
            top: 100%; 
            left: 0; 
            right: 0; 
            background-color: #2c251d; 
            border-radius: 0 0 6px 6px; 
            max-height: 250px; 
            overflow-y: auto; 
            box-shadow: 0px 10px 15px rgba(0,0,0,0.7);
        }

        .autocomplete-items div { 
            padding: 12px; 
            cursor: pointer; 
            border-bottom: 1px solid #3e3326; 
            color: #e0dcd3;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-weight: bold;
        }

        .autocomplete-items div:hover { 
            background-color: #4a5d23; 
            color: #fff; 
        }
        
        /* Grid Styles */
        .grid-header { 
            display: grid; 
            grid-template-columns: 2fr repeat(7, 1fr); 
            gap: 6px; 
            margin-top: 35px; 
            font-weight: bold; 
            font-size: 14px; 
            color: #a4b391;
            text-transform: uppercase;
            border-bottom: 2px solid #3c4a28;
            padding-bottom: 10px;
        }

        .guess-row { 
            display: grid; 
            grid-template-columns: 2fr repeat(7, 1fr); 
            gap: 6px; 
            margin-top: 10px; 
        }

        .box { 
            padding: 15px 5px; 
            border-radius: 5px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: bold; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #383e42, #24282a); 
            border: 2px solid #1a1c1d;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.6), inset 1px 1px 2px rgba(255,255,255,0.1);
            text-shadow: 1px 1px 2px #000;
        }
        
        .correct { 
            background: linear-gradient(145deg, #3b8c2a, #265c1b) !important; 
            border-color: #193d11 !important;
            color: white; 
        } 
        
        .wrong { 
            background: linear-gradient(145deg, #a83232, #702020) !important; 
            border-color: #4a1515 !important;
            color: white; 
        }

        /* 🏆 MODAL STYLES (Game Over Screen) 🏆 */
        #gameOverModal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #2c251d;
            margin: 15% auto; 
            padding: 30px; 
            border: 4px solid #f39c12;
            width: 80%; 
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 30px rgba(243, 156, 18, 0.4);
        }
        .modal-content h2 { color: #f39c12; margin-top: 0; font-size: 2em;}
        .modal-content p { font-family: 'Segoe UI', sans-serif; font-size: 18px;}
        
        #shareBtn {
            background-color: #f39c12;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.2s;
        }
        #shareBtn:hover { background-color: #e67e22; transform: scale(1.05);}
        #shareBtn:active { transform: scale(0.95);}

        /* 📱 MOBILE RESPONSIVENESS & SCROLLING (UPDATED FOR BIG PHONES) 📱 */
        .grid-wrapper {
            width: 100%;
            overflow-x: auto; 
            padding-bottom: 12px; 
            -webkit-overflow-scrolling: touch; 
        }

        .grid-header, .guess-row {
            min-width: 850px; 
        }

        .grid-wrapper::-webkit-scrollbar { height: 8px; }
        .grid-wrapper::-webkit-scrollbar-track { background: #1a1714; border-radius: 4px; border: 1px solid #3c4a28; }
        .grid-wrapper::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 4px; }

        /* CHANGED THIS TO 768px TO CATCH ALL PHONES */
        @media (max-width: 768px) {
            h1 { 
                font-size: 2em; 
                margin-bottom: 5px;
                text-shadow: 2px 2px 0px #000, 3px 3px 10px rgba(243, 156, 18, 0.4); 
            }
            .subtitle { 
                font-size: 14px; 
                margin-bottom: 20px; 
            }
            .container { 
                padding: 15px; 
                border-width: 2px; 
                width: 95%; 
                box-sizing: border-box; 
                margin: 0 auto;
            }
            .search-container { 
                width: 100%; 
            } 
            input[type="text"] { 
                font-size: 16px; 
                padding: 12px; 
            }
            .box { 
                padding: 12px 6px; 
                font-size: 13px; 
            }
            .grid-header { 
                font-size: 12px; 
                margin-top: 20px;
                gap: 4px;
            }
            .guess-row {
                gap: 4px;
            }
            .modal-content {

                padding: 25px; 
                margin: 25% auto;
            }
            .grid-header, .guess-row {
                min-width: 750px;
            }
        }

                font-size: 1.5em;
                margin-bottom: 10px;

            .modal-content p {
                font-size: 15px;
                margin-bottom: 15px;
            }
            #shareBtn {
                padding: 12px 25px;
                font-size: 16px;
            }
            .grid-header, .guess-row {
                min-width: 700px;
            }
        }

            }
            .subtitle { 
                font-size: 11px;
                margin-bottom: 12px;
            }
            .container {
                padding: 10px;
                width: 99%;
            }
            input[type="text"] {
                font-size: 14px;
                padding: 10px;
            }
            .box {
                padding: 10px 3px;
                font-size: 10px;
            }
            .grid-header {
                font-size: 10px;
                gap: 2px;
                margin-top: 15px;
            }
            .guess-row {
                gap: 2px;
            }
            .grid-header, .guess-row {
                min-width: 650px;
            }
        }
    </style>
</head>

        "MN82 Land Cruiser": { brand: "MN Model", scale: 12, axles: "Straight", licensed: "Yes", build: "RTR", price: 65, year: 2024 },
        "WPL C24": { brand: "WPL", scale: 16, axles: "Straight", licensed: "No", build: "Kit", price: 45, year: 2018 },
        "RGT EX86190 Rescuer": { brand: "RGT", scale: 10, axles: "Straight", licensed: "Yes", build: "RTR", price: 350, year: 2022 },
        "Yikong YK4102": { brand: "Yikong", scale: 10, axles: "Portal", licensed: "No", build: "RTR", price: 350, year: 2020 },
        "Yikong YK4083": { brand: "Yikong", scale: 8, axles: "Portal", licensed: "No", build: "RTR", price: 450, year: 2022 }
    };

    // --- DAILY MIDNIGHT RESET LOGIC ---
    // We set a launch date so "Day 1" is today!
    const launchDate = new Date("2026-03-14T00:00:00Z");
    const today = new Date();
    const gameDayNumber = Math.floor((today - launchDate) / (1000 * 60 * 60 * 24)) + 1;
    
    const allCrawlerKeys = Object.keys(crawlerDB);
    const dailyIndex = gameDayNumber % allCrawlerKeys.length;
    const dailyAnswerName = allCrawlerKeys[dailyIndex];
    const answer = crawlerDB[dailyAnswerName];

    let guessesCount = 0;
    const maxGuesses = 5;
    const inputField = document.getElementById("guessInput");
    const autocompleteList = document.getElementById("autocomplete-list");
    
    // Array to secretly track the emoji grid!
    let guessHistoryEmoji = []; 

    // Autocomplete Logic (Bulletproof Lenient Search)
    inputField.addEventListener("input", function() {
        let val = this.value;
        autocompleteList.innerHTML = "";
        if (!val.trim()) return false;

        const rawTerms = val.toLowerCase().trim().split(/\s+/);
        
        allCrawlerKeys.forEach(crawler => {
            const crawlerLower = crawler.toLowerCase();
            const crawlerLenient = crawlerLower.replace(/[-\s/]/g, ""); 
            
            const isMatch = rawTerms.every(term => {
                const termLenient = term.replace(/[-\s/]/g, "");
                return crawlerLower.includes(term) || crawlerLenient.includes(termLenient);
            });

            if (isMatch) {
                const item = document.createElement("div");
                let displayText = crawler;
                rawTerms.forEach(term => {
                    const escapeRegex = (s) => s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    const regex = new RegExp("(" + escapeRegex(term) + ")", "gi");
                    if (regex.test(displayText)) {
                        displayText = displayText.replace(regex, "<strong>$1</strong>");
                    }
                });

                item.innerHTML = displayText;
                
                item.addEventListener("click", function() {
                    inputField.value = crawler;
                    autocompleteList.innerHTML = "";
                    makeGuess(crawler); 
                });
                autocompleteList.appendChild(item);
            }
        });
    });

    document.addEventListener("click", function (e) {
        if (e.target !== inputField) autocompleteList.innerHTML = "";
    });

    function makeGuess(inputVal) {
        const guess = crawlerDB[inputVal];
        if (guessesCount >= maxGuesses) return; // Prevent extra guesses

        guessesCount++;
        renderGuess(inputVal, guess);
        inputField.value = '';

        if (inputVal === dailyAnswerName) {
            endGame(true);
        } else if (guessesCount >= maxGuesses) {
            endGame(false);
        }
    }

    function renderGuess(name, guess) {
        const board = document.getElementById('gameBoard');
        const row = document.createElement('div');
        row.className = 'guess-row';

        let rowEmojis = ""; // Temporary string for this row's emojis

        function checkTrait(guessedTrait, actualTrait, isNumber = false, isPrice = false) {
            let displayTrait = isPrice ? "$" + guessedTrait : guessedTrait;

            if (guessedTrait === actualTrait) {
                rowEmojis += "🟩";
                return `<div class="box correct">${displayTrait}</div>`;
            }
            
            if (isNumber) {
                const arrow = guessedTrait > actualTrait ? "⬇️" : "⬆️";
                rowEmojis += arrow;
                return `<div class="box wrong">${displayTrait} ${arrow}</div>`;
            }
            
            rowEmojis += "🟥";
            return `<div class="box wrong">${displayTrait}</div>`;
        }

        row.innerHTML = `
            <div class="box" style="background-color: #444; font-size: 12px; color: #fff;">${name}</div>
            ${checkTrait(guess.brand, answer.brand)}
            ${checkTrait(guess.scale, answer.scale, true)}
            ${checkTrait(guess.axles, answer.axles)}
            ${checkTrait(guess.licensed, answer.licensed)}
            ${checkTrait(guess.build, answer.build)}
            ${checkTrait(guess.price, answer.price, true, true)} 
            ${checkTrait(guess.year, answer.year, true)}
        `;
        
        board.appendChild(row);
        guessHistoryEmoji.push(rowEmojis); // Save the emoji string to our global array
    }

    function endGame(isWin) {
        const modal = document.getElementById("gameOverModal");
        const title = document.getElementById("modalTitle");
        const text = document.getElementById("modalText");
        
        inputField.disabled = true; // Lock the search bar
        
        if (isWin) {
            title.innerText = "TRAIL CLEARED!";
            title.style.color = "#2ecc71";
            text.innerText = `You nailed it in ${guessesCount} tries!`;
        } else {
            title.innerText = "STUCK IN THE MUD!";
            title.style.color = "#e74c3c";
            text.innerText = `Out of guesses. The answer was the ${dailyAnswerName}.`;
        }
        
        setTimeout(() => { modal.style.display = "block"; }, 500);
    }

    function shareResults() {
        // Build the text block to copy
        const gameStatus = guessesCount >= maxGuesses && guessHistoryEmoji[guessesCount-1].includes("🟥") ? "X" : guessesCount;
        
        let shareText = `🛻 Crawl-dle #${gameDayNumber}\n`;
        shareText += `Attempts: ${gameStatus}/${maxGuesses}\n\n`;
        shareText += guessHistoryEmoji.join('\n');
        
        // ADD YOUR NETLIFY URL HERE!
        shareText += `\n\nPlay here: https://crawldle.netlify.app`; 

        // Copy to device clipboard
        navigator.clipboard.writeText(shareText).then(() => {
            const btn = document.getElementById("shareBtn");
            btn.innerText = "✅ COPIED!";
            btn.style.backgroundColor = "#2ecc71";
            setTimeout(() => { 
                btn.innerText = "📋 Share Results"; 
                btn.style.backgroundColor = "#f39c12";
            }, 2000);
        }).catch(err => {
            alert("Oops! Couldn't copy to clipboard.");
        });
    }
</script>
