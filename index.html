    function getDeviceType() {
        const ua = navigator.userAgent;
        if (/mobile|android|iphone|ipod|blackberry|iemobile|opera mini/i.test(ua.toLowerCase())) {
            return 'mobile';
        } else if (/ipad|android/i.test(ua.toLowerCase())) {
            return 'tablet';
        }
        return 'desktop';
    }

    // Get browser and OS information
    function getBrowserInfo() {
        const ua = navigator.userAgent;
        let browser = 'Unknown';
        let os = 'Unknown';

        // Detect Browser
        if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('Edge')) browser = 'Edge';
        else if (ua.includes('Opera')) browser = 'Opera';

        // Detect OS
        if (ua.includes('Windows')) os = 'Windows';
        else if (ua.includes('Mac')) os = 'MacOS';
        else if (ua.includes('Linux')) os = 'Linux';
        else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
        else if (ua.includes('Android')) os = 'Android';

        return { browser, os, userAgent: ua };
    }

    // Get country from IP (using free API)
    async function getCountry() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            return data.country_name || 'Unknown';
        } catch (error) {
            console.log('Could not fetch country:', error);
            return 'Unknown';
        }
    }

    // Track gameplay session to Supabase
    async function saveGameplaySession(isWin, firstGuess, guessesArray) {
        if (!supabaseClient) {
            console.log('⚠️  Supabase not ready yet, skipping save');
            return null;
        }

        try {
            const browserInfo = getBrowserInfo();
            const country = await getCountry();

            const sessionData = {
                player_id: PLAYER_ID,
                game_date: new Date().toISOString().split('T')[0],
                game_number: gameDayNumber,
                crawler_of_day: dailyAnswerName,
                guess_count: guessesCount,
                game_status: isWin ? 'won' : (guessesCount >= maxGuesses ? 'lost' : 'incomplete'),

                guesses_order: guessesArray,
                emoji_grid: guessHistoryEmoji.join('\n'),
                time_spent_seconds: Math.floor((Date.now() - gameStartTime) / 1000),
                device_type: getDeviceType(),
                browser: browserInfo.browser,
                os: browserInfo.os,
                user_agent: browserInfo.userAgent,
                country: country,
                referrer: document.referrer || 'direct'
            };

            console.log('📤 Attempting to save session data:', sessionData);
            
            const { data, error } = await supabaseClient
                .from('gameplay_sessions')
                .insert([sessionData])
                .select();

            if (error) {
                console.error('❌ Supabase error saving gameplay session:', error.message, error.details);
                return null;
            } 
            
            if (!data || data.length === 0) {
                console.error('❌ No data returned from insert - table might not exist');
                return null;
            }
            
            console.log('✅ Gameplay session saved:', data);
            return data[0]?.id;
        } catch (error) {
            console.error('❌ Failed to save gameplay session:', error.message);
        }
    }

    // --- DAILY MIDNIGHT RESET LOGIC ---
    // We set a launch date so "Day 1" is today!
    const launchDate = new Date("2026-03-12T00:00:00Z");
    const today = new Date();
    const gameDayNumber = Math.floor((today - launchDate) / (1000 * 60 * 60 * 24)) + 1;
    
    const allCrawlerKeys = Object.keys(crawlerDB);
    const dailyIndex = gameDayNumber % allCrawlerKeys.length;
    const dailyAnswerName = allCrawlerKeys[dailyIndex];
    const answer = crawlerDB[dailyAnswerName];
    
    // Calculate next reset time (next midnight UTC)
    function getNextResetTime() {
        const now = new Date();
        const nextReset = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1, 0, 0, 0));
        return nextReset;
    }
    
    // Update countdown timer
    function updateCountdown() {
        const now = new Date();
        const nextReset = getNextResetTime();
        const timeDiff = nextReset - now;
        
        const hours = String(Math.floor((timeDiff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
        const minutes = String(Math.floor((timeDiff / (1000 * 60)) % 60)).padStart(2, '0');
        const seconds = String(Math.floor((timeDiff / 1000) % 60)).padStart(2, '0');
        
        document.getElementById('countdownHours').textContent = hours;
        document.getElementById('countdownMinutes').textContent = minutes;
        document.getElementById('countdownSeconds').textContent = seconds;
    }
    
    // Update countdown immediately and every second
    updateCountdown();
    setInterval(updateCountdown, 1000);

    let guessesCount = 0;
    const maxGuesses = 5;
    const inputField = document.getElementById("guessInput");
    const autocompleteList = document.getElementById("autocomplete-list");
    
    // Array to secretly track the emoji grid!
    let guessHistoryEmoji = [];
    let guessHistoryArray = []; // Track all guesses for analytics
    let gameStartTime = Date.now(); // Track time spent 

    // Autocomplete Logic (Bulletproof Lenient Search)
    inputField.addEventListener("input", function() {
        let val = this.value;
        autocompleteList.innerHTML = "";
        if (!val.trim()) return false;

        const rawTerms = val.toLowerCase().trim().split(/\s+/);
        
        allCrawlerKeys.forEach(crawler => {
            const crawlerLower = crawler.toLowerCase();
            const crawlerLenient = crawlerLower.replace(/[-\s/]/g, ""); 
            
            const isMatch = rawTerms.every(term => {
                const termLenient = term.replace(/[-\s/]/g, "");
                return crawlerLower.includes(term) || crawlerLenient.includes(termLenient);
            });

            if (isMatch) {
                const item = document.createElement("div");
                let displayText = crawler;
                rawTerms.forEach(term => {
                    const escapeRegex = (s) => s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    const regex = new RegExp("(" + escapeRegex(term) + ")", "gi");
                    if (regex.test(displayText)) {
                        displayText = displayText.replace(regex, "<strong>$1</strong>");
                    }
                });

                item.innerHTML = displayText;
                
                item.addEventListener("click", function() {
                    inputField.value = crawler;
                    autocompleteList.innerHTML = "";
                    makeGuess(crawler); 
                });
                autocompleteList.appendChild(item);
            }
        });
    });

    document.addEventListener("click", function (e) {
        if (e.target !== inputField) autocompleteList.innerHTML = "";
    });

    function makeGuess(inputVal) {
        const guess = crawlerDB[inputVal];
        if (guessesCount >= maxGuesses) return; // Prevent extra guesses

        guessesCount++;
        guessHistoryArray.push(inputVal); // Track guess for analytics
        
        // Determine if this is a game-ending guess
        let isGameEnding = false;
        let isWin = false;
        
        if (inputVal === dailyAnswerName) {
            isGameEnding = true;
            isWin = true;
        } else if (guessesCount >= maxGuesses) {
            isGameEnding = true;
            isWin = false;
        }
        
        renderGuess(inputVal, guess, isGameEnding, isWin);
        inputField.value = '';
    }

    function renderGuess(name, guess, isGameEnding = false, isWin = false) {
        const board = document.getElementById('gameBoard');
        const row = document.createElement('div');
        row.className = 'guess-row';

        let rowEmojis = ""; // Temporary string for this row's emojis

        function checkTrait(guessedTrait, actualTrait, isNumber = false, isPrice = false) {
            let displayTrait = isPrice ? "$" + guessedTrait : guessedTrait;

            if (guessedTrait === actualTrait) {
                rowEmojis += "🟩";
                return `<div class="box correct">${displayTrait}</div>`;
            }
            
            if (isNumber) {
                const arrow = guessedTrait > actualTrait ? "⬇️" : "⬆️";
                rowEmojis += arrow;
                return `<div class="box wrong">${displayTrait} ${arrow}</div>`;
            }
            
            rowEmojis += "🟥";
            return `<div class="box wrong">${displayTrait}</div>`;
        }

        row.innerHTML = `
            <div class="box" style="background: linear-gradient(135deg, #3c3c3c 0%, #2a2a2a 100%); font-size: 12px; color: #f39c12;">${name}</div>
            ${checkTrait(guess.brand, answer.brand)}
            ${checkTrait(guess.scale, answer.scale, true)}
            ${checkTrait(guess.axles, answer.axles)}
            ${checkTrait(guess.licensed, answer.licensed)}
            ${checkTrait(guess.build, answer.build)}
            ${checkTrait(guess.price, answer.price, true, true)} 
            ${checkTrait(guess.year, answer.year, true)}
        `;
        
        board.appendChild(row);
        
        // Animate boxes one by one with staggered delay
        const boxes = row.querySelectorAll('.box');
        const gridWrapper = document.querySelector('.grid-wrapper');        
        // Reset scroll to left before animation starts
        gridWrapper.scrollLeft = 0;
        const totalAnimationDuration = (boxes.length - 1) * 550 + 550;
        
        // Calculate if scrolling is needed
        const maxScroll = gridWrapper.scrollWidth - gridWrapper.clientWidth;
        
        if (maxScroll > 0) {
            // Calculate what percentage of content fits on screen without scrolling
            const visiblePercentage = gridWrapper.clientWidth / gridWrapper.scrollWidth;
            // Start scrolling BEFORE boxes overflow (with a buffer of ~1 box duration)
            const scrollStartTime = Math.max(0, (visiblePercentage * totalAnimationDuration) - 550);
            
            const animationStartTime = Date.now();
            
            const animateScroll = () => {
                const elapsed = Date.now() - animationStartTime;
                
                // Start scrolling earlier so new boxes are visible as they animate in
                if (elapsed >= scrollStartTime) {
                    const scrollElapsed = elapsed - scrollStartTime;
                    const remainingDuration = totalAnimationDuration - scrollStartTime;
                    const progress = Math.min(scrollElapsed / remainingDuration, 1);
                    gridWrapper.scrollLeft = progress * maxScroll;
                }
                
                if (elapsed < totalAnimationDuration) {
                    requestAnimationFrame(animateScroll);
                }
            };
            
            requestAnimationFrame(animateScroll);
        }
        
        boxes.forEach((box, index) => {
            setTimeout(() => {
                box.classList.add('animate');
            }, index * 550); // 550ms (0.55 second) stagger between each box
        });
        
        // If this is a game-ending guess, trigger endGame after all animations complete
        if (isGameEnding) {
            setTimeout(() => {
                endGame(isWin);
            }, totalAnimationDuration);
        }
        
        guessHistoryEmoji.push(rowEmojis); // Save the emoji string to our global array
    }

    let currentGameSessionId = null; // Store session ID for affiliate tracking

    function endGame(isWin) {
        const modal = document.getElementById("gameOverModal");
        const title = document.getElementById("modalTitle");
        const text = document.getElementById("modalText");
        
        inputField.disabled = true; // Lock the search bar
        
        if (isWin) {
            title.innerText = "TRAIL CLEARED!";
            title.style.color = "#2ecc71";
            text.innerText = `You nailed it in ${guessesCount} tries!`;
        } else {
            title.innerText = "STUCK IN THE MUD!";
            title.style.color = "#e74c3c";
            text.innerText = `Out of guesses. The answer was the ${dailyAnswerName}.`;
        }
        
        // Save gameplay data to Supabase
        const firstGuess = guessHistoryArray.length > 0 ? guessHistoryArray[0] : null;
        saveGameplaySession(isWin, firstGuess, guessHistoryArray).then(sessionId => {
            currentGameSessionId = sessionId;
            console.log('Game session saved with ID:', sessionId);
        });
        
        setTimeout(() => { modal.style.display = "block"; }, 500);
    }

    function shareResults() {
        // Build the text block to copy
        const gameStatus = guessesCount >= maxGuesses && guessHistoryEmoji[guessesCount-1].includes("🟥") ? "X" : guessesCount;
        
        let shareText = `🛻 Crawldle #${gameDayNumber}\n`;
        shareText += `Attempts: ${gameStatus}/${maxGuesses}\n\n`;
        shareText += guessHistoryEmoji.join('\n');
        
        // ADD YOUR URL HERE!
        shareText += `\n\nPlay here: https://crawldle.com`; 

        // Copy to device clipboard
        navigator.clipboard.writeText(shareText).then(() => {
            const btn = document.getElementById("shareBtn");
            btn.innerText = "✅ COPIED!";
            btn.style.backgroundColor = "#2ecc71";
            setTimeout(() => { 
                btn.innerText = "📋 Share Results"; 
                btn.style.backgroundColor = "#f39c12";
            }, 2000);
        }).catch(err => {
            alert("Oops! Couldn't copy to clipboard.");
        });
    }
